<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SuccessionScope — App demo</title>
<style>
/* Broadsheet design-system tokens (claude.ai/design project, styles.css) */
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap');
:root {
  --color-bg: #f3f2f2;
  --color-surface: #eae9e9;
  --color-text: #201e1d;
  --color-accent: #0088b0;
  --color-accent-2: #d6006c;
  --color-divider: color-mix(in srgb, #201e1d 16%, transparent);
  --color-neutral-100: #f8f4f4;
  --color-neutral-800: #444141;
  --color-accent-100: #e9f8ff;
  --color-accent-600: #1186ac;
  --color-accent-700: #006786;
  --color-accent-800: #004961;
  --color-accent-2-700: #aa0b56;
  --font-heading: "Source Serif 4", system-ui, sans-serif;
  --font-heading-weight: 600;
  --font-body: "Source Serif 4", system-ui, sans-serif;
  --space-1: 5px; --space-2: 10px; --space-3: 15px; --space-4: 20px;
  --radius-sm: 1px; --radius-md: 2px; --radius-lg: 4px;
  --shadow-sm: 0 1px 2px color-mix(in srgb, #2d2b2b 14%, transparent);
}
*, *::before, *::after { box-sizing:border-box; }
body { margin:0; background:var(--color-bg); color:var(--color-text);
  font-family:var(--font-body); font-size:15px; line-height:1.55; }
h1,h2,h3 { font-family:var(--font-heading); font-weight:var(--font-heading-weight);
  line-height:1.12; letter-spacing:-0.015em; margin:0 0 var(--space-2); }
p { margin:0 0 var(--space-3); }
a { color:var(--color-accent-700); text-underline-offset:3px; }
a:hover { color:var(--color-accent); }
:focus { outline:none; }
:focus-visible { outline:2px solid var(--color-accent); outline-offset:2px; }
::selection { background:color-mix(in srgb, var(--color-accent) 30%, transparent); }

.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px;
  cursor:pointer; text-decoration:none; font-family:var(--font-heading);
  font-weight:var(--font-heading-weight); font-size:14px; line-height:1.2;
  color:var(--color-text); background:transparent; border:1px solid transparent;
  padding:var(--space-2) calc(var(--space-3) * 1.2); border-radius:var(--radius-md); }
.btn:disabled { opacity:0.45; cursor:not-allowed; }
.btn-primary { background:var(--color-accent); color:var(--color-bg); }
.btn-primary:hover { background:var(--color-accent-600); }
.btn-secondary { border-color:var(--color-divider); }
.btn-secondary:hover { background:color-mix(in srgb, var(--color-text) 7%, transparent); }
.btn-ghost { color:var(--color-accent); padding-inline:var(--space-1); }
.btn-ghost:hover { background:color-mix(in srgb, var(--color-accent) 10%, transparent); }

.input { width:100%; min-height:36px; padding:6px 10px; font:inherit; font-size:14px;
  color:var(--color-text); caret-color:var(--color-accent); background:var(--color-surface);
  border:1px solid var(--color-divider); border-radius:var(--radius-md); }
.input::placeholder { color:color-mix(in srgb, var(--color-text) 65%, transparent); opacity:1; }
.input:hover { border-color:color-mix(in srgb, var(--color-text) 45%, transparent); }
.input:focus-visible { border-color:var(--color-accent); outline-offset:0; }
textarea.input { min-height:60px; }
.field > label { display:block; font-size:12px; margin-bottom:5px;
  color:color-mix(in srgb, var(--color-text) 70%, transparent); }

.tag { display:inline-flex; align-items:center; font-size:11px; letter-spacing:0.02em;
  padding:3px 10px; border-radius:calc(var(--radius-md) * 0.75); border:0; }
.tag-accent { background:var(--color-accent-100); color:var(--color-accent-800); }
.tag-neutral { background:var(--color-neutral-100); color:var(--color-neutral-800); }

.seg { display:inline-flex; overflow:hidden; border:1px solid var(--color-divider);
  border-radius:var(--radius-md); }
.seg-opt { display:inline-flex; align-items:center; gap:6px; padding:7px 12px;
  font-size:13px; cursor:pointer; font-family:var(--font-body); border:0;
  background:transparent; color:inherit; font-feature-settings:'tnum' 1; }
.seg-opt + .seg-opt { border-left:1px solid var(--color-divider); }
.seg-opt[aria-pressed="true"] { background:var(--color-accent); color:var(--color-bg); }
.seg-opt[aria-pressed="false"]:hover { background:color-mix(in srgb, var(--color-text) 7%, transparent); }

.card { display:flex; flex-direction:column; gap:var(--space-2);
  padding:var(--space-3); border-radius:var(--radius-md); background:var(--color-surface); }
.elev-sm { box-shadow:var(--shadow-sm); }

.table { width:100%; border-collapse:collapse; font-size:14px; }
.table th { text-align:left; font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
  color:color-mix(in srgb, var(--color-text) 60%, transparent);
  padding:var(--space-2); border-bottom:1px solid var(--color-divider); }
.table td { padding:var(--space-2);
  border-bottom:1px solid color-mix(in srgb, var(--color-text) 8%, transparent); }
.table tbody tr:hover { background:color-mix(in srgb, var(--color-text) 4%, transparent); }

.nav-brand { font-family:var(--font-heading); font-weight:var(--font-heading-weight); }
.navbtn { display:flex; justify-content:space-between; align-items:baseline; gap:8px;
  font-family:var(--font-heading); font-size:15px; text-align:left; padding:8px 10px;
  border:0; border-radius:var(--radius-md); cursor:pointer; width:100%;
  background:transparent; color:inherit; font-weight:400; }
.navbtn:hover { background:color-mix(in srgb, var(--color-text) 5%, transparent); }
.navbtn[aria-current="true"] { background:color-mix(in srgb, var(--color-accent) 10%, transparent);
  color:var(--color-accent-800); font-weight:600; }
.navbtn .count { font-size:12px; font-feature-settings:'tnum' 1;
  color:color-mix(in srgb, var(--color-text) 50%, transparent); }

.kicker { font-size:11px; letter-spacing:0.09em; text-transform:uppercase;
  color:color-mix(in srgb, var(--color-text) 55%, transparent); font-weight:400;
  font-family:var(--font-body); margin:0 0 8px; }
.dim { color:color-mix(in srgb, var(--color-text) 65%, transparent); }
.mono { font-feature-settings:'tnum' 1; }
.headfont { font-family:var(--font-heading); font-weight:var(--font-heading-weight); }
.colhead { font-size:11px; letter-spacing:0.08em; text-transform:uppercase;
  color:color-mix(in srgb, var(--color-text) 60%, transparent); }
.pgrid { display:grid;
  grid-template-columns:150px minmax(200px,1.6fr) 64px minmax(96px,0.8fr) 52px 84px minmax(180px,1.2fr);
  gap:0 16px; }
.prow { align-items:center; padding:11px 10px; cursor:pointer;
  border-bottom:1px solid color-mix(in srgb, var(--color-text) 8%, transparent); }
.prow:hover { background:color-mix(in srgb, var(--color-text) 4%, transparent); }
.scorebar { flex:1; height:8px; border-radius:var(--radius-sm); overflow:hidden;
  background:color-mix(in srgb, var(--color-text) 8%, transparent); }
.scorebar > span { display:block; height:100%; background:var(--color-accent); }
.chipbtn { cursor:pointer; font-feature-settings:'tnum' 1; background:transparent;
  color:inherit; border:1px solid var(--color-divider); }
.chipbtn:hover { border-color:var(--color-accent); }
.chipbtn[aria-pressed="true"] { border-color:var(--color-accent);
  background:var(--color-accent-100); color:var(--color-accent-800); }
.sicrow { display:grid; grid-template-columns:64px 1fr auto; gap:12px; align-items:baseline;
  text-align:left; font-family:var(--font-body); font-size:14px; padding:7px 10px;
  border:0; border-radius:var(--radius-md); cursor:pointer; background:transparent; color:inherit; }
.sicrow:hover { background:color-mix(in srgb, var(--color-text) 5%, transparent); }
.sicrow[aria-pressed="true"] { background:color-mix(in srgb, var(--color-accent) 8%, transparent); }
</style>
</head>

  <main style="flex:1;min-width:0;padding:0 clamp(24px,3.5vw,56px) 64px">

      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">

    <p style="margin:0;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-accent-2-700)">Demo edition — fictional companies and filings</p>

</div>

/* ---------- thesis builder ---------- */

function previewCount() {
  var base = APP.baseCount * (state.bSics.length / APP.sics.length) *
    (state.bRegions.length ? state.bRegions.length / APP.regions.length : 1);
  var ageF = { "10": 1, "15": 0.72, "20": 0.48, "25": 0.29 }[state.bMinAge];
  var scF = { "50": 0.31, "60": 0.14, "70": 0.052, "80": 0.013 }[state.bMinScore];
  return Math.max(12, Math.round(base * ageF * scF * (1 - 0.06 * state.bExcl.length)));
}

function sicRowsHtml() {
  var q = state.bSicQuery.trim().toLowerCase();
  return APP.sics.filter(function (s) {
    return !q || s[0].indexOf(q) === 0 || s[1].toLowerCase().indexOf(q) >= 0;
  }).slice(0, 7).map(function (s) {
    var on = state.bSics.indexOf(s[0]) >= 0;
    return '<button class="sicrow" data-action="bsic-toggle" data-arg="' + esc(s[0]) +
      '" aria-pressed="' + on + '">' +

      "<span>" + esc(s[1]) + "</span>" +

      (on ? "included" : "") + "</span></button>";

}

function render() {
  renderNav();
  var html;
  if (state.screen === "detail") html = detailHtml();
  else if (state.screen === "theses") html = thesesHtml();
  else if (state.screen === "shortlist") html = shortlistHtml();
  else if (state.screen === "alerts") html = alertsHtml();
  else if (state.screen === "settings") html = settingsHtml();
  else html = pipelineHtml();
  document.getElementById("screen").innerHTML = html;
}

document.addEventListener("click", function (e) {
  var el = e.target.closest("[data-action]");
  if (!el) return;
  var action = el.getAttribute("data-action");
  var arg = el.getAttribute("data-arg");
  if (action === "nav") { state.screen = arg; render(); }
  else if (action === "minscore") { state.minScore = Number(arg); render(); }
  else if (action === "sig") {
    var i = state.sigFilters.indexOf(arg);
    if (i >= 0) state.sigFilters.splice(i, 1); else state.sigFilters.push(arg);
    render();
  }
  else if (action === "open") { state.screen = "detail"; state.selId = Number(arg); render(); }
  else if (action === "back") { state.screen = "pipeline"; render(); }
  else if (action === "shortlist-add") {
    if (!state.shortlist[arg]) state.shortlist[arg] = { stage: 0, notes: "" };
    render();
  }
  else if (action === "export") {
    state.exported = true;
    el.textContent = "Queued — check email";
    setTimeout(function () {
      state.exported = false;
      var btn = document.getElementById("exportBtn");
      if (btn) btn.textContent = "Export PDF";
    }, 2500);
  }
  else if (action === "bsic-toggle") {
    var j = state.bSics.indexOf(arg);
    if (j >= 0) state.bSics.splice(j, 1); else state.bSics.push(arg);
    updateBuilderPreview();
    el.setAttribute("aria-pressed", String(j < 0));
  }
  else if (action === "bregion") {
    var k = state.bRegions.indexOf(arg);
    if (k >= 0) state.bRegions.splice(k, 1); else state.bRegions.push(arg);
    el.setAttribute("aria-pressed", String(k < 0));
    updateBuilderPreview();
  }
  else if (action === "bexcl") {
    var m = state.bExcl.indexOf(arg);
    if (m >= 0) state.bExcl.splice(m, 1); else state.bExcl.push(arg);
    el.setAttribute("aria-pressed", String(m < 0));
    updateBuilderPreview();
  }
  else if (action === "bsave") {
    var name = state.bName.trim() || "Untitled thesis";
    var id = "t" + state.theses.length + "_" + name.toLowerCase().replace(/[^a-z0-9]+/g, "-");
    state.theses.push({ id: id, label: name,
      meta: previewCount().toLocaleString("en-GB") + " match · saved " + APP.savedStamp });
    state.activeThesis = id;
    state.savedNote = "“" + name + "” saved — now the active thesis.";
    state.bName = "";
    render();
    setTimeout(function () { state.savedNote = ""; var n = document.getElementById("saveNote");
      if (n) n.textContent = ""; }, 3000);
  }
  else if (action === "notes-toggle") {
    var cid = Number(arg);
    state.notesOpenId = state.notesOpenId === cid ? null : cid;
    render();
  }
  else if (action === "move") {
    var parts = arg.split(",");
    var entry = state.shortlist[parts[0]];
    if (entry) {
      entry.stage = Math.max(0, Math.min(3, entry.stage + Number(parts[1])));
      render();
    }
  }
  else if (action === "digest") { state.digest = !state.digest; render(); }
});

document.addEventListener("input", function (e) {
  var el = e.target.closest("[data-action]");
  if (!el) return;
  var action = el.getAttribute("data-action");
  if (action === "bname") { state.bName = el.value; }
  else if (action === "bsic-query") { state.bSicQuery = el.value; updateBuilderPreview(); }
  else if (action === "notes") {
    var entry = state.shortlist[el.getAttribute("data-arg")];
    if (entry) entry.notes = el.value;
  }
});

document.addEventListener("change", function (e) {
  var el = e.target.closest("[data-action]");
  if (!el) return;
  var action = el.getAttribute("data-action");
  if (action === "thesis") { state.activeThesis = el.value; }
  else if (action === "region") { state.region = el.value; render(); }
  else if (action === "bminage") { state.bMinAge = el.value; updateBuilderPreview(); }
  else if (action === "bminscore") { state.bMinScore = el.value; updateBuilderPreview(); }
});

render();
</script>
</body>
</html>
